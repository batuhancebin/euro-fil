<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300" fill="none">
  <defs>
    <linearGradient id="bg2" x1="0" y1="0" x2="400" y2="300" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#1c1c1f"/>
      <stop offset="100%" stop-color="#27272a"/>
    </linearGradient>
    <linearGradient id="tank2" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#3f3f46"/>
      <stop offset="50%" stop-color="#52525b"/>
      <stop offset="100%" stop-color="#3f3f46"/>
    </linearGradient>
    <linearGradient id="blueAccent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#1e3a8a"/>
      <stop offset="50%" stop-color="#2254f4"/>
      <stop offset="100%" stop-color="#1e3a8a"/>
    </linearGradient>
  </defs>

  <rect width="400" height="300" fill="url(#bg2)"/>

  <!-- Glow -->
  <ellipse cx="200" cy="262" rx="150" ry="16" fill="#2254f4" opacity="0.1"/>

  <!-- Base -->
  <rect x="40" y="248" width="320" height="8" rx="4" fill="#3f3f46"/>
  <rect x="55" y="244" width="290" height="6" rx="3" fill="#2f2f35"/>

  <!-- Main large tank (left) -->
  <ellipse cx="120" cy="100" rx="52" ry="14" fill="#52525b"/>
  <rect x="68" y="100" width="104" height="148" fill="url(#tank2)"/>
  <ellipse cx="120" cy="248" rx="52" ry="14" fill="#3a3a40"/>
  <!-- Tank details -->
  <rect x="80" y="120" width="80" height="110" rx="4" fill="#27272a" opacity="0.3"/>
  <!-- Level indicator -->
  <rect x="158" y="125" width="6" height="90" rx="3" fill="#27272a"/>
  <rect x="158" y="175" width="6" height="40" rx="3" fill="#2254f4" opacity="0.7"/>
  <!-- Bolts -->
  <circle cx="82" cy="115" r="3" fill="#27272a"/>
  <circle cx="158" cy="115" r="3" fill="#27272a"/>
  <circle cx="82" cy="240" r="3" fill="#27272a"/>
  <circle cx="158" cy="240" r="3" fill="#27272a"/>
  <!-- Label -->
  <text x="120" y="180" font-family="monospace" font-size="8" fill="#71717a" text-anchor="middle">FRP TANK</text>
  <text x="120" y="194" font-family="monospace" font-size="7" fill="#52525b" text-anchor="middle">HIGH CAPACITY</text>
  <!-- Top pipe -->
  <rect x="110" y="80" width="20" height="22" rx="4" fill="#52525b"/>
  <rect x="114" y="68" width="12" height="14" rx="3" fill="#3f3f46"/>

  <!-- Control panel (center) -->
  <rect x="188" y="130" width="60" height="100" rx="6" fill="#2a2a2e"/>
  <rect x="190" y="132" width="56" height="96" rx="5" fill="#232326"/>
  <!-- Display -->
  <rect x="194" y="138" width="48" height="28" rx="3" fill="#0f0f11"/>
  <rect x="196" y="140" width="44" height="24" rx="2" fill="#0a1628"/>
  <text x="218" y="154" font-family="monospace" font-size="9" fill="#2254f4" text-anchor="middle">TDS</text>
  <text x="218" y="163" font-family="monospace" font-size="8" fill="#60a5fa" text-anchor="middle">024 ppm</text>
  <!-- Buttons -->
  <circle cx="200" cy="180" r="5" fill="#374151"/>
  <circle cx="218" cy="180" r="5" fill="#374151"/>
  <circle cx="236" cy="180" r="5" fill="#2254f4" opacity="0.8"/>
  <!-- Status lights -->
  <circle cx="200" cy="196" r="3" fill="#22c55e" opacity="0.9"/>
  <circle cx="212" cy="196" r="3" fill="#22c55e" opacity="0.6"/>
  <circle cx="224" cy="196" r="3" fill="#f59e0b" opacity="0.7"/>
  <circle cx="236" cy="196" r="3" fill="#374151"/>
  <!-- Pipe connections on panel -->
  <rect x="185" y="155" width="6" height="3" rx="1" fill="#3f3f46"/>
  <rect x="245" y="155" width="6" height="3" rx="1" fill="#3f3f46"/>

  <!-- Pump unit (right) -->
  <rect x="268" y="168" width="72" height="65" rx="6" fill="#2a2a2e"/>
  <ellipse cx="304" cy="168" rx="28" ry="10" fill="#3f3f46"/>
  <ellipse cx="304" cy="200" rx="22" ry="22" fill="#2f2f35"/>
  <ellipse cx="304" cy="200" rx="14" ry="14" fill="#3a3a40"/>
  <ellipse cx="304" cy="200" rx="7" ry="7" fill="#2254f4" opacity="0.5"/>
  <text x="304" y="240" font-family="monospace" font-size="7" fill="#71717a" text-anchor="middle">PUMP</text>

  <!-- Pipe from tank to panel -->
  <rect x="172" y="180" width="18" height="4" rx="2" fill="#3f3f46"/>
  <!-- Pipe from panel to pump -->
  <rect x="248" y="180" width="22" height="4" rx="2" fill="#3f3f46"/>

  <!-- Top pipes -->
  <path d="M120 68 L120 55 Q120 48 130 48 L200 48 Q210 48 210 55 L210 130" stroke="#3f3f46" stroke-width="5" fill="none"/>
  <path d="M210 130 L210 48 Q210 38 220 38 L304 38 Q314 38 314 48 L314 168" stroke="#2254f4" stroke-width="3" fill="none" opacity="0.4"/>

  <!-- Output pipe bottom -->
  <rect x="100" y="248" width="8" height="20" rx="3" fill="#3f3f46"/>
  <rect x="97" y="265" width="14" height="6" rx="3" fill="#52525b"/>

  <!-- Label -->
  <text x="200" y="278" font-family="system-ui,sans-serif" font-size="11" fill="#a1a1aa" text-anchor="middle" font-weight="600">ENDÜSTRİYEL PRO SERİSİ</text>
</svg>
