<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300" fill="none">
  <defs>
    <linearGradient id="bg3" x1="0" y1="0" x2="400" y2="300" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#1c1c1f"/>
      <stop offset="100%" stop-color="#27272a"/>
    </linearGradient>
    <linearGradient id="chamber" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#2f2f35"/>
      <stop offset="50%" stop-color="#3a3a42"/>
      <stop offset="100%" stop-color="#2f2f35"/>
    </linearGradient>
    <linearGradient id="uvGlow" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#312e81"/>
      <stop offset="50%" stop-color="#4338ca"/>
      <stop offset="100%" stop-color="#312e81"/>
    </linearGradient>
    <radialGradient id="uvCenter" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#818cf8" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="#4338ca" stop-opacity="0"/>
    </radialGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <rect width="400" height="300" fill="url(#bg3)"/>

  <!-- UV glow ambiance -->
  <ellipse cx="200" cy="170" rx="90" ry="60" fill="#4338ca" opacity="0.07"/>
  <ellipse cx="200" cy="262" rx="120" ry="14" fill="#4338ca" opacity="0.12"/>

  <!-- Base -->
  <rect x="80" y="248" width="240" height="8" rx="4" fill="#3f3f46"/>

  <!-- Main chamber (cylinder horizontal-ish) -->
  <!-- Left cap -->
  <ellipse cx="100" cy="170" rx="14" ry="55" fill="#3f3f46"/>
  <!-- Body -->
  <rect x="100" y="115" width="200" height="110" fill="url(#chamber)"/>
  <!-- Right cap -->
  <ellipse cx="300" cy="170" rx="14" ry="55" fill="#3f3f46"/>
  <!-- Inner highlight -->
  <rect x="108" y="118" width="184" height="10" rx="2" fill="#52525b" opacity="0.4"/>

  <!-- UV lamp inside -->
  <rect x="110" y="162" width="180" height="16" rx="8" fill="url(#uvGlow)"/>
  <rect x="112" y="164" width="176" height="12" rx="6" fill="#6366f1" opacity="0.8"/>
  <!-- UV rays -->
  <ellipse cx="200" cy="170" rx="80" ry="28" fill="url(#uvCenter)"/>

  <!-- UV ray lines -->
  <line x1="140" y1="145" x2="140" y2="115" stroke="#6366f1" stroke-width="1" opacity="0.3"/>
  <line x1="160" y1="140" x2="160" y2="115" stroke="#6366f1" stroke-width="1" opacity="0.3"/>
  <line x1="180" y1="138" x2="180" y2="115" stroke="#6366f1" stroke-width="1.5" opacity="0.4"/>
  <line x1="200" y1="136" x2="200" y2="115" stroke="#818cf8" stroke-width="2" opacity="0.5"/>
  <line x1="220" y1="138" x2="220" y2="115" stroke="#6366f1" stroke-width="1.5" opacity="0.4"/>
  <line x1="240" y1="140" x2="240" y2="115" stroke="#6366f1" stroke-width="1" opacity="0.3"/>
  <line x1="260" y1="145" x2="260" y2="115" stroke="#6366f1" stroke-width="1" opacity="0.3"/>

  <line x1="140" y1="195" x2="140" y2="225" stroke="#6366f1" stroke-width="1" opacity="0.3"/>
  <line x1="160" y1="200" x2="160" y2="225" stroke="#6366f1" stroke-width="1" opacity="0.3"/>
  <line x1="180" y1="202" x2="180" y2="225" stroke="#6366f1" stroke-width="1.5" opacity="0.4"/>
  <line x1="200" y1="204" x2="200" y2="225" stroke="#818cf8" stroke-width="2" opacity="0.5"/>
  <line x1="220" y1="202" x2="220" y2="225" stroke="#6366f1" stroke-width="1.5" opacity="0.4"/>
  <line x1="240" y1="200" x2="240" y2="225" stroke="#6366f1" stroke-width="1" opacity="0.3"/>
  <line x1="260" y1="195" x2="260" y2="225" stroke="#6366f1" stroke-width="1" opacity="0.3"/>

  <!-- Water inlet (left) -->
  <rect x="56" y="158" width="44" height="12" rx="5" fill="#3f3f46"/>
  <circle cx="60" cy="164" r="7" fill="#2a2a2e"/>
  <circle cx="60" cy="164" r="4" fill="#2254f4" opacity="0.5"/>

  <!-- Water outlet (right) -->
  <rect x="300" y="158" width="44" height="12" rx="5" fill="#3f3f46"/>
  <circle cx="340" cy="164" r="7" fill="#2a2a2e"/>
  <circle cx="340" cy="164" r="4" fill="#22c55e" opacity="0.5"/>

  <!-- IN / OUT labels -->
  <text x="60" y="152" font-family="monospace" font-size="7" fill="#52525b" text-anchor="middle">IN</text>
  <text x="340" y="152" font-family="monospace" font-size="7" fill="#52525b" text-anchor="middle">OUT</text>

  <!-- Controller box (top) -->
  <rect x="162" y="70" width="76" height="40" rx="5" fill="#232326"/>
  <rect x="164" y="72" width="72" height="36" rx="4" fill="#1a1a1d"/>
  <!-- UV indicator -->
  <circle cx="185" cy="90" r="8" fill="#312e81"/>
  <circle cx="185" cy="90" r="5" fill="#6366f1" opacity="0.9"/>
  <text x="185" y="93" font-family="monospace" font-size="5" fill="#c7d2fe" text-anchor="middle">UV</text>
  <!-- Power light -->
  <circle cx="207" cy="87" r="4" fill="#22c55e" opacity="0.9"/>
  <!-- Timer display -->
  <rect x="215" y="82" width="18" height="12" rx="2" fill="#0a0a0d"/>
  <text x="224" y="91" font-family="monospace" font-size="7" fill="#6366f1" text-anchor="middle">365</text>

  <!-- Wire from controller to chamber -->
  <path d="M200 110 L200 115" stroke="#3f3f46" stroke-width="4" fill="none"/>

  <!-- Mounting brackets -->
  <rect x="130" y="225" width="16" height="24" rx="3" fill="#2a2a2e"/>
  <rect x="126" y="245" width="24" height="5" rx="2" fill="#3f3f46"/>
  <rect x="254" y="225" width="16" height="24" rx="3" fill="#2a2a2e"/>
  <rect x="250" y="245" width="24" height="5" rx="2" fill="#3f3f46"/>

  <!-- UV wavelength label -->
  <text x="200" y="50" font-family="monospace" font-size="8" fill="#6366f1" text-anchor="middle" opacity="0.7">λ = 254 nm</text>

  <!-- Bottom label -->
  <text x="200" y="276" font-family="system-ui,sans-serif" font-size="11" fill="#a1a1aa" text-anchor="middle" font-weight="600">UV STERİLİZATÖR</text>
</svg>
